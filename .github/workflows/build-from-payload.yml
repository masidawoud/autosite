name: Build and deploy from Payload CMS

on:
  workflow_dispatch:
    inputs:
      client_id:
        description: 'Tenant slug (e.g. lie-dental)'
        required: true
        type: string
      cf_project_name:
        description: 'Cloudflare Pages project name (e.g. dentist-lie-dental)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout autosite repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dental-template/package-lock.json

      - name: Fetch content from Payload and write data files
        env:
          PAYLOAD_API_URL: ${{ secrets.PAYLOAD_API_URL }}
          PAYLOAD_API_EMAIL: ${{ secrets.PAYLOAD_API_EMAIL }}
          PAYLOAD_API_PASSWORD: ${{ secrets.PAYLOAD_API_PASSWORD }}
        run: |
          node -e "
          const fs = require('fs');

          function lightenAccent(hex) {
            const h = hex.replace('#', '');
            const r = Math.round(parseInt(h.substring(0,2), 16) * 0.15 + 255 * 0.85).toString(16).padStart(2, '0');
            const g = Math.round(parseInt(h.substring(2,4), 16) * 0.15 + 255 * 0.85).toString(16).padStart(2, '0');
            const b = Math.round(parseInt(h.substring(4,6), 16) * 0.15 + 255 * 0.85).toString(16).padStart(2, '0');
            return '#' + r + g + b;
          }

          async function main() {
            // 1. Login to get a token
            const loginRes = await fetch(process.env.PAYLOAD_API_URL + '/api/users/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                email: process.env.PAYLOAD_API_EMAIL,
                password: process.env.PAYLOAD_API_PASSWORD,
              }),
            });
            const loginData = await loginRes.json();
            if (!loginRes.ok) {
              console.error('Login failed:', loginData);
              process.exit(1);
            }
            const token = loginData.token;
            console.log('Logged in successfully');

            // 2. Fetch the dental site for this tenant (depth=2 for nested relations)
            const clientId = '${{ inputs.client_id }}';
            const url = process.env.PAYLOAD_API_URL + '/api/dental-sites?where[tenant.slug][equals]=' + clientId + '&depth=2&limit=1';
            const siteRes = await fetch(url, {
              headers: { Authorization: 'Bearer ' + token },
            });
            const siteData = await siteRes.json();

            if (!siteData.docs || siteData.docs.length === 0) {
              console.error('No dental site found for tenant:', clientId);
              process.exit(1);
            }

            const site = siteData.docs[0];
            console.log('Fetched site:', site.practiceName);

            // 3. Write business.json
            const businessJson = {
              name: site.practiceName || '',
              city: site.business?.city || '',
              address: site.business?.address || '',
              postal_code: site.business?.postalCode || '',
              phone: site.contact?.phone || '',
              email: site.contact?.email || '',
              google_reviews_score: site.business?.googleReviewsScore || '',
              google_reviews_count: site.business?.googleReviewsCount || 0,
              google_reviews_url: site.business?.googleReviewsUrl || '#',
            };
            fs.writeFileSync('dental-template/src/data/business.json', JSON.stringify(businessJson, null, 2));
            console.log('business.json written');

            // 4. Write footer.json
            const footerJson = {
              meta_title: site.footer?.metaTitle || '',
              meta_description: site.footer?.metaDescription || '',
              tagline: site.footer?.tagline || '',
              social: [],
            };
            fs.writeFileSync('dental-template/src/data/footer.json', JSON.stringify(footerJson, null, 2));
            console.log('footer.json written');

            // 5. Load theme preset, apply accent overrides, write theme.json
            const stylePreset = site.theme?.stylePreset || 'warm-editorial';
            const themePresetPath = 'dental-template/src/data/themes/' + stylePreset + '.json';
            const theme = JSON.parse(fs.readFileSync(themePresetPath, 'utf8'));

            if (site.theme?.accentColor) {
              theme.colors.accent = site.theme.accentColor;
              theme.colors.accent_light = lightenAccent(site.theme.accentColor);
            }
            if (site.theme?.accentHoverColor) {
              theme.colors.accent_hover = site.theme.accentHoverColor;
            }

            fs.writeFileSync('dental-template/src/data/theme.json', JSON.stringify(theme, null, 2));
            console.log('theme.json written (preset: ' + stylePreset + ')');

            // 6. Build sections array for home.md
            function lexicalToText(editorState) {
              if (!editorState || !editorState.root) return '';
              function walk(node) {
                if (node.type === 'text') return node.text || '';
                if (node.children) return node.children.map(walk).join(' ');
                return '';
              }
              return walk(editorState.root).replace(/\s+/g, ' ').trim();
            }

            var sections;

            if (site.sections && site.sections.length > 0) {
              // ── Blocks path: use new page-builder data ─────────────────────
              sections = site.sections.map(function(block) {
                switch (block.blockType) {
                  case 'hero':
                    return {
                      type: 'hero', enabled: true,
                      eyebrow: block.eyebrow || '',
                      headline: block.headline || '',
                      description: lexicalToText(block.description),
                      cta_primary: block.ctaPrimary || 'Maak een afspraak',
                      cta_secondary: block.ctaSecondary || 'Bel ons',
                      image_url: block.imageUrl || 'https://picsum.photos/seed/dental-hero/720/860',
                    };
                  case 'quote':
                    return {
                      type: 'quote', enabled: true,
                      text: block.text || '',
                      author_name: block.authorName || '',
                      author_role: block.authorRole || '',
                    };
                  case 'features':
                    return {
                      type: 'features', enabled: true,
                      eyebrow: block.eyebrow || '',
                      title: block.title || '',
                      subtitle: block.subtitle || '',
                      image_url: block.imageUrl || '',
                      items: (block.items || []).map(function(i) {
                        return { icon: i.icon || '', title: i.title || '', desc: i.desc || '' };
                      }),
                    };
                  case 'services':
                    return {
                      type: 'services', enabled: true,
                      eyebrow: block.eyebrow || '',
                      title: block.title || '',
                      subtitle: block.subtitle || '',
                      items: (block.items || []).map(function(i) {
                        return {
                          tag: i.tag || '',
                          title: i.title || '',
                          desc: i.desc || '',
                          image_url: i.imageUrl || '',
                          items: (i.bullets || []).map(function(b) { return b.text || ''; }),
                          cta: i.cta || '',
                        };
                      }),
                    };
                  case 'team':
                    return {
                      type: 'team', enabled: true,
                      eyebrow: block.eyebrow || '',
                      title: block.title || '',
                      subtitle: block.subtitle || '',
                      members: (block.members || []).map(function(m) {
                        return {
                          name: m.name || '',
                          role: m.role || '',
                          bio: lexicalToText(m.bio),
                          image_url: m.imageUrl || '',
                        };
                      }),
                    };
                  case 'reviews':
                    return {
                      type: 'reviews', enabled: true,
                      title: block.title || '',
                      subtitle: block.subtitle || '',
                      items: (block.items || []).map(function(r) {
                        return { name: r.name || '', stars: r.stars || 0, date: r.date || '', text: r.text || '' };
                      }),
                    };
                  case 'hours':
                    return {
                      type: 'hours', enabled: true,
                      items: (block.items || []).map(function(h) {
                        return { day: h.day || '', time: h.time || '', open: h.open !== false };
                      }),
                    };
                  case 'vergoeding':
                    return {
                      type: 'vergoeding', enabled: true,
                      eyebrow: block.eyebrow || '',
                      title: block.title || '',
                      intro: lexicalToText(block.intro),
                      blocks: (block.infoBlocks || []).map(function(b) {
                        return { title: b.title || '', text: b.text || '' };
                      }),
                      insurers: (block.insurers || []).map(function(i) { return i.name || ''; }),
                      cta: block.cta || '',
                    };
                  case 'contact':
                    return {
                      type: 'contact', enabled: true,
                      eyebrow: block.eyebrow || '',
                      title: block.title || '',
                      intro: lexicalToText(block.intro),
                    };
                  default:
                    console.warn('Unknown blockType: ' + block.blockType + ' — skipping');
                    return null;
                }
              }).filter(function(s) { return s !== null; });

            } else {
              // ── Legacy path: fall back to flat field groups ────────────────
              sections = [
                {
                  type: 'hero', enabled: true,
                  eyebrow: site.hero?.eyebrow || '',
                  headline: site.hero?.headline || '',
                  description: site.hero?.description || '',
                  cta_primary: site.hero?.ctaPrimary || 'Maak een afspraak',
                  cta_secondary: site.hero?.ctaSecondary || 'Bel ons',
                  image_url: site.hero?.imageUrl || 'https://picsum.photos/seed/dental-hero/720/860',
                },
                {
                  type: 'quote', enabled: true,
                  text: site.quote?.text || '',
                  author_name: site.quote?.authorName || '',
                  author_role: site.quote?.authorRole || '',
                },
                {
                  type: 'features', enabled: true,
                  eyebrow: site.features?.eyebrow || '',
                  title: site.features?.title || '',
                  subtitle: site.features?.subtitle || '',
                  image_url: site.features?.imageUrl || '',
                  items: (site.features?.items || []).map(function(i) {
                    return { icon: i.icon, title: i.title, desc: i.desc };
                  }),
                },
                {
                  type: 'services', enabled: true,
                  eyebrow: site.services?.eyebrow || '',
                  title: site.services?.title || '',
                  subtitle: site.services?.subtitle || '',
                  items: (site.services?.items || []).map(function(i) {
                    return {
                      tag: i.tag || '',
                      title: i.title || '',
                      desc: i.desc || '',
                      image_url: i.imageUrl || '',
                      items: Array.isArray(i.bulletsJson) ? i.bulletsJson : [],
                      cta: i.cta || '',
                    };
                  }),
                },
                {
                  type: 'team', enabled: true,
                  eyebrow: site.team?.eyebrow || '',
                  title: site.team?.title || '',
                  subtitle: site.team?.subtitle || '',
                  members: (site.team?.members || []).map(function(m) {
                    return { name: m.name, role: m.role, bio: m.bio, image_url: m.imageUrl };
                  }),
                },
                {
                  type: 'reviews', enabled: true,
                  title: site.reviews?.title || '',
                  subtitle: site.reviews?.subtitle || '',
                  items: (site.reviews?.items || []).map(function(r) {
                    return { name: r.name, stars: r.stars, date: r.date, text: r.text };
                  }),
                },
                {
                  type: 'hours', enabled: true,
                  items: (site.hours?.items || []).map(function(h) {
                    return { day: h.day, time: h.time, open: h.open };
                  }),
                },
                {
                  type: 'vergoeding', enabled: true,
                  eyebrow: site.vergoeding?.eyebrow || '',
                  title: site.vergoeding?.title || '',
                  intro: site.vergoeding?.intro || '',
                  blocks: (site.vergoeding?.blocks || []).map(function(b) {
                    return { title: b.title, text: b.text };
                  }),
                  insurers: (site.vergoeding?.insurers || []).map(function(i) { return i.name; }),
                  cta: site.vergoeding?.cta || '',
                },
                {
                  type: 'contact', enabled: true,
                  eyebrow: site.contact?.eyebrow || '',
                  title: site.contact?.title || '',
                  intro: site.contact?.intro || '',
                },
              ];
            }

            const frontmatter = JSON.stringify({ title: 'Home', published: true, sections: sections });
            const homeMd = '---\n' + frontmatter + '\n---\n\n';
            fs.writeFileSync('dental-template/src/content/pages/home.md', homeMd);
            console.log('home.md written (' + sections.length + ' sections)');
          }

          main().catch(function(err) { console.error(err); process.exit(1); });
          "

      - name: Build Astro site
        working-directory: dental-template
        run: npm ci && npm run build

      - name: Deploy to Cloudflare Pages
        working-directory: dental-template
        run: npx wrangler@4 pages deploy dist --project-name=${{ inputs.cf_project_name }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
