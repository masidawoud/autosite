<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Content Manager</title>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/@sveltia/cms/dist/sveltia-cms.js"></script>
  <script>
    // Hide bulk-delete button and selection checkboxes in collection list view
    const observer = new MutationObserver(() => {
      document.querySelectorAll('button').forEach(btn => {
        if (btn.textContent.trim() === 'Delete') btn.style.display = 'none';
      });
      // Only hide checkboxes in list view; show them in entry editor (boolean fields)
      const inEditor = location.hash.includes('/entries/') || location.hash.includes('/new');
      document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        cb.style.display = inEditor ? '' : 'none';
      });
    });
    observer.observe(document.body, { childList: true, subtree: true });
  </script>
</body>
</html>
